[package]
name = "gyt"
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
description = "A small modern Rust git-alternative"
license = "GPL-3.0-or-later"

[features]
default = []
xz = ["dep:lzma-rust2"]

[dependencies]
blake3 = "=1.8.5"
rustls = { version = "=0.23.40", default-features = false, features = ["std", "tls12", "logging", "ring"] }
rustls-pki-types = "=1.14.1"
webpki-roots = "=1.0.7"
lzma-rust2 = { version = "=0.16.2", optional = true, default-features = false, features = ["std", "encoder", "xz"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
